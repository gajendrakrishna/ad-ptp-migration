version: 2

models:
  - name: stg_fact_inventory_receipt
    description: >-
      Migrated from etl.usp_Load_Fact_Inventory_Receipt.
      Target: dbo.fact_inventory_receipt.
      Computes running cumulative received quantity per PO line and resolves
      dimension surrogate keys for the goods receipt fact table.
    columns:
      - name: gr_bk
        description: "Degenerate dimension - goods receipt number (business key)"
        data_tests:
          - not_null

      - name: po_bk
        description: "Degenerate dimension - purchase order number (business key)"
        data_tests:
          - not_null

      - name: receiptdate_sk
        description: "Foreign key to dim_date for the actual receipt date; 0 when unresolved"
        data_tests:
          - not_null

      - name: expecteddelivery_sk
        description: "Foreign key to dim_date for the expected delivery date; 0 when unresolved"
        data_tests:
          - not_null

      - name: vendor_sk
        description: "Foreign key to dim_vendor (current SCD2 row); -1 when unresolved"
        data_tests:
          - not_null
          - relationships:
              to: source('dbo', 'Dim_Vendor')
              field: vendor_sk
              config:
                where: "vendor_sk != -1"

      - name: product_sk
        description: "Foreign key to dim_product (current SCD2 row); -1 when unresolved"
        data_tests:
          - not_null
          - relationships:
              to: source('dbo', 'Dim_Product')
              field: product_sk
              config:
                where: "product_sk != -1"

      - name: location_sk
        description: "Foreign key to dim_location via rule-based category mapping; -1 when unresolved"
        data_tests:
          - not_null

      - name: receivedby_employee_sk
        description: "Foreign key to dim_employee for receiving employee (current SCD2 row); -1 when unresolved"
        data_tests:
          - not_null

      - name: gr_status
        description: "Goods receipt status; only 'Posted' receipts are loaded"
        data_tests:
          - not_null
          - accepted_values:
              values: ['Posted']

      - name: quantity_ordered
        description: "Quantity ordered on the PO line"
        data_tests:
          - not_null

      - name: quantity_this_receipt
        description: "Quantity received in this individual goods receipt line"
        data_tests:
          - not_null

      - name: cumulative_qty_received
        description: "Running cumulative quantity received against the PO line across all receipts in chronological order"
        data_tests:
          - not_null

      - name: quantity_outstanding
        description: "Remaining quantity outstanding on the PO line (ordered minus cumulative)"
        data_tests:
          - not_null

      - name: receipt_completeness_pct
        description: "Percentage of PO line quantity fulfilled by cumulative receipts"
        data_tests:
          - not_null

      - name: lead_time_days
        description: "Lead time in days from PO date to goods receipt date"
        data_tests:
          - not_null

      - name: delivery_variance_days
        description: >-
          Delivery variance in days vs expected delivery date.
          Positive = late, negative = early, null = no expected delivery date set.

      - name: dw_load_datetime
        description: "Watermark timestamp when the row was loaded; used for incremental processing"
        data_tests:
          - not_null
          - dbt_utils.recency:
              datepart: day
              field: dw_load_datetime
              interval: 1

      - name: _dbt_run_id
        description: "dbt invocation ID for lineage tracking"

    unit_tests:
