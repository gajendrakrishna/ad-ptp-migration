version: 2

models:
  - name: stg_fact_purchaseorder
    description: >
      Migrated from etl.usp_load_fact_po.
      Target: dbo.fact_purchaseorder.
      Purchase order fact table at the grain of one row per PO line.
      Joins source PO and PO line data with conformed dimensions
      (Vendor, Product, Employee x2 roles, Date x2 roles) and resolves
      optional upstream requisition line data for negotiation KPIs.
    columns:
      - name: po_bk
        description: "Business key: purchase order number from source system."
        data_tests:
          - not_null

      - name: po_line_number
        description: "Line number within the purchase order."
        data_tests:
          - not_null

      - name: requisition_bk
        description: >
          Business key: requisition number from source system.
          Nullable when the PO was raised without a preceding requisition.

      - name: podate_sk
        description: >
          Surrogate key to dbo.Dim_Date for the PO date.
          Defaults to 0 when no matching date dimension row is found.
        data_tests:
          - not_null
          - relationships:
              to: source('dbo', 'Dim_Date')
              field: Date_SK

      - name: expecteddelivery_sk
        description: >
          Surrogate key to dbo.Dim_Date for the expected delivery date.
          Defaults to 0 when no matching date dimension row is found.
        data_tests:
          - not_null
          - relationships:
              to: source('dbo', 'Dim_Date')
              field: Date_SK

      - name: vendor_sk
        description: >
          Surrogate key to dbo.Dim_Vendor for the supplying vendor.
          Defaults to -1 when no current SCD2 dimension row is found.
        data_tests:
          - not_null
          - relationships:
              to: source('dbo', 'Dim_Vendor')
              field: Vendor_SK

      - name: product_sk
        description: >
          Surrogate key to dbo.Dim_Product for the ordered item.
          Defaults to -1 when no current SCD2 dimension row is found.
        data_tests:
          - not_null
          - relationships:
              to: source('dbo', 'Dim_Product')
              field: Product_SK

      - name: buyer_employee_sk
        description: >
          Surrogate key to dbo.Dim_Employee for the buyer (role-playing).
          Defaults to -1 when no current SCD2 dimension row is found.
        data_tests:
          - not_null
          - relationships:
              to: source('dbo', 'Dim_Employee')
              field: Employee_SK

      - name: approver_employee_sk
        description: >
          Surrogate key to dbo.Dim_Employee for the approver (role-playing).
          Defaults to -1 when no current SCD2 dimension row is found.
        data_tests:
          - not_null
          - relationships:
              to: source('dbo', 'Dim_Employee')
              field: Employee_SK

      - name: po_status
        description: "Status of the purchase order (e.g. Open, Closed, Invoiced)."
        data_tests:
          - not_null

      - name: quantity_ordered
        description: "Quantity of the item ordered on this PO line."
        data_tests:
          - not_null

      - name: agreed_unit_price
        description: "Negotiated unit price agreed with the vendor for this line."
        data_tests:
          - not_null

      - name: po_line_total
        description: "Total value of this PO line: quantity_ordered * agreed_unit_price."
        data_tests:
          - not_null

      - name: estimated_unit_price
        description: >
          Estimated unit price from the upstream requisition line.
          Nullable when no requisition line exists for this PO line.

      - name: price_savings_vs_estimate
        description: >
          Savings achieved vs the budget estimate:
          (estimated_unit_price - agreed_unit_price) * quantity_ordered.
          Positive = savings. Nullable when estimated_unit_price is null.

      - name: approval_duration_days
        description: >
          Number of calendar days from the requisition date to the PO date.
          Nullable when no upstream requisition is linked to this PO.

      - name: dw_load_datetime
        description: "Timestamp when this row was loaded by dbt."
        data_tests:
          - not_null

      - name: _dbt_run_id
        description: "dbt invocation ID for lineage and auditability."
        data_tests:
          - not_null

