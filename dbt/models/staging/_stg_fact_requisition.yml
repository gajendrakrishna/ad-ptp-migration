version: 2

models:
  - name: stg_fact_requisition
    description: >
      "Migrated from etl.usp_load_fact_requisition.
      Target: dbo.fact_requisition."
    columns:
      - name: requisition_bk
        description: "Business key — requisition number from source system"
        data_tests:
          - not_null

      - name: requisitionline_bk
        description: "Business key — requisition line ID from source system"
        data_tests:
          - not_null

      - name: requisitiondate_sk
        description: "Foreign key to dim_date for requisition date (0 if unmatched)"

      - name: requiredbydate_sk
        description: "Foreign key to dim_date for required-by date (0 if unmatched)"

      - name: requestor_employee_sk
        description: >
          "Foreign key to dim_employee for the requestor
          (-1 if unmatched)"
        data_tests:
          - relationships:
              to: ref('stg_dim_employee')
              field: employee_sk
              where: "requestor_employee_sk != -1"

      - name: approver_employee_sk
        description: >
          "Foreign key to dim_employee for the approver
          (-1 if unmatched or unapproved)"
        data_tests:
          - relationships:
              to: ref('stg_dim_employee')
              field: employee_sk
              where: "approver_employee_sk != -1"

      - name: product_sk
        description: "Foreign key to dim_product (-1 if unmatched)"
        data_tests:
          - relationships:
              to: ref('stg_dim_product')
              field: product_sk
              where: "product_sk != -1"

      - name: suggestedvendor_sk
        description: "Foreign key to dim_vendor (-1 if unmatched)"
        data_tests:
          - relationships:
              to: ref('stg_dim_vendor')
              field: vendor_sk
              where: "suggestedvendor_sk != -1"

      - name: requisition_status
        description: "Requisition status from source (Pending/Approved/Rejected/Converted)"
        data_tests:
          - not_null

      - name: is_approved
        description: "1 if status is Approved or Converted, else 0"

      - name: is_rejected
        description: "1 if status is Rejected, else 0"

      - name: is_converted_to_po
        description: "1 if status is Converted, else 0"

      - name: quantity_requested
        description: "Quantity of items requested on the line"

      - name: estimated_unit_price
        description: "Estimated unit price at time of requisition"

      - name: estimated_line_total
        description: "Computed: quantity * estimated_unit_price"

      - name: approval_duration_days
        description: >
          "Days from requisition date to actioning date
          (null for Pending status)"

      - name: dw_load_datetime
        description: "Batch load timestamp set by dbt at run time"
        data_tests:
          - not_null

      - name: _dbt_run_id
        description: "dbt invocation ID for lineage tracking"

    unit_tests:
