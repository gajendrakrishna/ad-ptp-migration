          - input: source('master', 'items')
            rows:
              - ItemID: 13063
                ItemCode: "TST-ITM-S1"
                ItemName: "Widget A"
                Description: null
                UnitOfMeasure: "EA"
                ItemCategory: "Hardware"
                AccountingType: "Direct"
                GLAccount: null
                IsActive: 1
                CreatedAt: "2023-01-01T00:00:00"

          - input: source('master', 'vendors')
            rows: []

          - input: source('dbo', 'dim_date')
            rows:
              - Date_SK: 20240110
                FullDate: "2024-01-10"

              - Date_SK: 20240201
                FullDate: "2024-02-01"

          - input: ref('stg_dim_employee')
            rows:
