                ApprovedByID: 20042
                CostCenterID: 100
                RequisitionDate: "2024-01-10"
                RequiredByDate: "2024-02-01"
                RequisitionStatus: "Approved"
                RejectionReason: null
                TotalAmount: 500.0
                Notes: null
                CreatedAt: "2024-01-10T00:00:00"
                UpdatedAt: "2024-01-15T00:00:00"

          - input: source('purchasing', 'requisitionlines')
            rows:
              - RequisitionID: 5012
                RequisitionLineID: 4013
                LineNumber: 1
                ItemID: 13063
                Quantity: 10.0
                EstimatedUnitPrice: 45.0
                SuggestedVendorID: null
                Notes: null

          - input: source('master', 'employees')
            rows:
              - EmployeeID: 20041
                EmployeeCode: "TST-EMP-S1R"
                FullName: "Alice Requester"
                Email: "tst-emp-s1r@test.com"
                Department: "Operations"
                JobTitle: "Analyst"
