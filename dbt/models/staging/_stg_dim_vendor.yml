                  Phone: null,
                  Address: null,
                  City: "Denver",
                  Country: "USA",
                  TaxID: "12-0000001",
                  PaymentTerms: "NET30",
                  VendorStatus: "Active",
                  CreatedAt: "2024-01-15",
