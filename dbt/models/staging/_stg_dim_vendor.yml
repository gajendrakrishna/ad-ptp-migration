version: 2

models:
  - name: stg_dim_vendor
    description: >
      Migrated from etl.usp_load_dim_vendor. Target: dbo.dim_vendor.
      Implements SCD Type 2 via union of expired rows and
      net-new/re-versioned rows from PTP_System.Master.Vendors.

    columns:
      - name: vendor_sk
        description: "Surrogate key — identity assigned by source system."
        data_tests:
          - not_null:
              where: "is_current = 1"

      - name: vendor_bk
        description: "Business natural key (VendorCode from source)."
        data_tests:
          - not_null

      - name: vendor_name
        description: "Vendor display name."

      - name: contact_name
        description: "Primary contact person name."
        meta:
          contains_pii: true
          pii_action: mask

      - name: city
        description: "City where the vendor is located."

      - name: country
        description: "Country where the vendor is located."

      - name: tax_id
        description: "Tax identifier for the vendor."
        meta:
          contains_pii: true
          pii_action: mask

      - name: payment_terms
        description: "Agreed payment terms (e.g. NET30, NET45)."

      - name: vendor_status
        description: "Operational status of the vendor."

      - name: effective_start
        description: "Date from which this version of the row is current."

      - name: effective_end
        description: >
          Date until which this version of the row is current.
          9999-12-31 indicates the active/current version.

      - name: is_current
        description: "Flag indicating the active SCD2 version (1=current)."

      - name: dw_insert_date
        description: "UTC timestamp when the row was first inserted."

      - name: dw_update_date
        description: "UTC timestamp when the row was last updated."

      - name: source_row_hash
        description: >
          SHA2-256 hash of tracked attributes used for change detection.

      - name: _dbt_run_id
        description: "dbt invocation ID for lineage tracking."

      - name: _loaded_at
        description: "Timestamp when the row was loaded by dbt."

