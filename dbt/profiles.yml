ad_ptp_migration:
  target: dev
  outputs:
    dev:
      type: sqlserver
      driver: "ODBC Driver 18 for SQL Server"
      server: "{{ env_var('MSSQL_HOST', 'localhost') }}"
      port: "{{ env_var('MSSQL_PORT', '1433') | int }}"
      database: "{{ env_var('MSSQL_DB') }}"
      user: sa
      password: "{{ env_var('SA_PASSWORD') }}"
      schema: dbo
      trust_cert: true
      threads: 4
